<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="ai-chat-app">
        <h3>AI 对话测试接口</h3>
        <input id="prompt-input" type="text" placeholder="输入提示词..."/>
        <button id="submit-bin">发送指令</button>
        <div id="output-box">大模型的回答将渲染在这里...</div>
    </div>
    <div id="api-config">
        <h3>系统设置</h3>
        <input id="api-key" type="text" placeholder="请输入你的OpenAI API Key"/>
        <button id="save-key">保存密钥</button>
    </div>
</body>
</html>
