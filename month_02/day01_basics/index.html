<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 1. 把整个网页的背景变成暗黑*/
        body {
            background-color: #1e1e1e; /* 极客深灰色 */
            color: #ffffff;            /* 把纯白文字挂上去 */
            font-family: sans-serif;     /* 换个清爽的无衬线字体 */
            padding: 50px;               /* 让内容离边缘远一点 */
        }
        /* 2. 把主题标颜色改成蓝色 */
        h1 {
            color: #4fc1ff;
            border-bottom: 2px solid #333;
            padding: 10px;
        }
        /* 把按钮重塑成扁平化现代风格 */
        button {
            background-color: #007acc;/* 微软蓝 */
            color: white;
            border: none;               /* 砍掉默认边框 */
            padding: 10px 20px;         /* 把按钮撑大 */
            border-radius: 4px;         /* 边缘略微磨圆 */
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>界面主标题</h1>
    <p>这是一句话，用于展示网页的基本文本结构</p>
    <button onclick="alert('操作成功')">确认提交</button>
</body>
</html>
